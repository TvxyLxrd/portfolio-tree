<main class="workspace" [class.drawer-open]="drawerVisible()">
  <header class="topbar">
    <div class="header-actions">
      <button class="icon-button" type="button" aria-label="Price sync">
        <i class="pi pi-refresh"></i>
        <span class="live-dot"></span>
      </button>
      <button class="ai-button" type="button" aria-label="AI assistant">
        AI
        <i class="pi pi-sparkles"></i>
      </button>
      <label class="search-box header-search">
        <i class="pi pi-search"></i>
        <input type="search" placeholder="Instrument search" (input)="setQuickFilter($event)" />
      </label>
      <button class="avatar-button" type="button" aria-label="User profile">
        <i class="pi pi-user"></i>
      </button>
    </div>
  </header>

  <section class="toolbar" aria-label="Portfolio controls">
    <div class="toolbar-group portfolio-controls">
      <button
        class="menu-button"
        type="button"
        aria-label="Open portfolio tree"
        (click)="drawerVisible.set(!drawerVisible())"
      >
        <i class="pi pi-bars"></i>
      </button>

      <button class="portfolio-select" type="button" (click)="drawerVisible.set(true)">
        <span>Portfolio</span>
        <strong>--</strong>
        <i class="pi pi-chevron-down"></i>
      </button>

      <button class="icon-button" type="button" aria-label="Rename portfolio">
        <i class="pi pi-pencil"></i>
      </button>
      <button class="icon-button" type="button" aria-label="Add portfolio">
        <i class="pi pi-plus"></i>
      </button>
    </div>

    <div class="toolbar-group grid-controls">
      <label class="search-box compact-search">
        <i class="pi pi-search"></i>
        <input
          type="search"
          placeholder="Add instrument"
          aria-label="Add instrument"
          (keydown.enter)="addInstrument($event)"
        />
        <i class="pi pi-chevron-down end-icon"></i>
      </label>

      <label class="search-box filter-search">
        <i class="pi pi-search"></i>
        <input type="search" placeholder="Filter" aria-label="Filter" (input)="setQuickFilter($event)" />
      </label>
    </div>

    <div class="toolbar-group utility-controls">
      @if (activeTreeFilter()) {
        <button class="filter-chip" type="button" (click)="clearFilter()">
          {{ activeTreeFilter() }}
          <i class="pi pi-times"></i>
        </button>
      }
      <button class="icon-button" type="button" aria-label="More actions">
        <i class="pi pi-ellipsis-v"></i>
      </button>
      <button class="fullscreen-button" type="button" aria-label="Fullscreen">
        <i class="pi pi-window-maximize"></i>
      </button>
    </div>
  </section>

  <section class="grid-shell">
    <ag-grid-angular
      class="portfolio-grid"
      [theme]="gridTheme"
      [rowData]="rowData"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [autoGroupColumnDef]="autoGroupColumnDef"
      [treeData]="true"
      treeDataChildrenField="children"
      [groupDefaultExpanded]="2"
      [suppressGroupRowsSticky]="true"
      [suppressNoRowsOverlay]="true"
      [animateRows]="true"
      [sideBar]="{
        toolPanels: ['columns', 'filters'],
        hiddenByDefault: true
      }"
      (gridReady)="onGridReady($event)"
    />
  </section>
</main>

<p-drawer
  styleClass="portfolio-drawer"
  position="left"
  [visible]="drawerVisible()"
  (visibleChange)="drawerVisible.set($event)"
  [modal]="false"
  [dismissible]="false"
  [showCloseIcon]="false"
  [style]="{ width: 'var(--drawer-width)' }"
>
  <ng-template #headless>
    <aside class="drawer-content" aria-label="Portfolio drawer"></aside>
  </ng-template>
</p-drawer>
