<main class="workspace" [class.drawer-open]="drawerVisible()">
  <header class="topbar">
    <div class="header-actions">
      <div class="sync-action">
        <p-button icon="pi pi-refresh" [text]="true" ariaLabel="Price sync" />
      </div>
      <div class="ai-action">
        <p-button label="AI" />
      </div>
      <p-iconfield>
        <p-inputicon class="pi pi-search" />
        <input
          pInputText
          type="search"
          placeholder="Instrument search"
          aria-label="Instrument search"
          (input)="setQuickFilter($event)"
        />
      </p-iconfield>
      <p-button
        icon="pi pi-user"
        [rounded]="true"
        [outlined]="true"
        ariaLabel="User profile"
      />
    </div>
  </header>

  <section class="toolbar" aria-label="Portfolio controls">
    <div class="toolbar-group portfolio-controls">
      <div class="drawer-toggle-action">
        <p-button
          icon="pi pi-bars"
          [text]="true"
          ariaLabel="Open portfolio tree"
          (onClick)="drawerVisible.set(!drawerVisible())"
        />
      </div>

      <p-select
        [options]="portfolioOptions"
        [(ngModel)]="selectedPortfolio"
        placeholder="Portfolio --"
        ariaLabel="Portfolio"
      />

      <p-menu
        #portfolioActionsMenu
        [model]="portfolioMenuItems"
        [popup]="true"
        appendTo="body"
      />
      <p-button
        icon="pi pi-ellipsis-v"
        [text]="true"
        ariaLabel="Portfolio actions"
        (onClick)="portfolioActionsMenu.toggle($event)"
      />
    </div>

    <div class="toolbar-group grid-controls">
      <p-multiselect
        [options]="instrumentOptions()"
        [(ngModel)]="selectedInstrumentOptions"
        optionLabel="name"
        placeholder="Add Instrument"
        [filter]="instrumentPanelLevel() === 'tickers'"
        [maxSelectedLabels]="3"
        [showHeader]="instrumentPanelLevel() === 'tickers'"
        [showToggleAll]="instrumentPanelLevel() === 'tickers'"
        [panelStyleClass]="instrumentPanelClass()"
        (onChange)="onInstrumentPanelChange($event)"
        [style]="{ width: '20rem', flex: '0 0 20rem' }"
      >
        <ng-template #header>
          <div class="instrument-panel-heading">
            <span
              class="instrument-panel-back pi pi-chevron-left"
              aria-hidden="true"
              [class.instrument-panel-back-hidden]="instrumentPanelLevel() === 'countries'"
              (click)="goBackInstrumentPanel($event)"
            ></span>
            <span class="instrument-panel-title">{{ instrumentPanelTitle() }}</span>
          </div>

          @if (instrumentPanelLevel() === 'exchanges') {
            <div
              class="instrument-panel-select-all"
              role="button"
              tabindex="0"
              (click)="onInstrumentPanelSelectAll($event)"
              (keydown.enter)="onInstrumentPanelSelectAll($event)"
              (keydown.space)="onInstrumentPanelSelectAll($event)"
            >
              <p-checkbox
                [binary]="true"
                [ngModel]="false"
                [readonly]="true"
                ariaLabel="Select all exchanges"
              />
              <span>Select all</span>
            </div>
          }
        </ng-template>

        <ng-template #item let-option>
          <span class="instrument-option-content">
            <span class="instrument-option-label">{{ option.name }}</span>
            @if (instrumentPanelLevel() !== 'tickers') {
              <span class="instrument-option-arrow p-cascadeselect-group-icon" aria-hidden="true">
                <svg data-p-icon="angle-right" />
              </span>
            }
          </span>
        </ng-template>
      </p-multiselect>

      <div class="card flex flex-wrap justify-center gap-4">
        <p-iconfield>
          <p-inputicon class="pi pi-search" />
          <input
            type="text"
            pInputText
            placeholder="Filter"
            aria-label="Filter"
            (input)="setQuickFilter($event)"
          />
        </p-iconfield>
      </div>
    </div>

    <div class="toolbar-group utility-controls">
      @if (activeTreeFilter()) {
        <div class="active-filter-action">
          <p-button
            [label]="activeTreeFilter()"
            icon="pi pi-times"
            iconPos="right"
            [outlined]="true"
            (onClick)="clearFilter()"
          />
        </div>
      }
      <div class="more-action">
        <p-button
          icon="pi pi-objects-column"
          [text]="true"
          ariaLabel="Customize columns"
        />
      </div>
      <p-button icon="pi pi-table" [text]="true" ariaLabel="Built-in tables" />
    </div>
  </section>

  <section class="grid-shell">
    <ag-grid-angular
      class="portfolio-grid"
      [theme]="gridTheme"
      [rowData]="rowData"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [autoGroupColumnDef]="autoGroupColumnDef"
      [treeData]="true"
      treeDataChildrenField="children"
      [groupDefaultExpanded]="2"
      [suppressGroupRowsSticky]="true"
      [suppressNoRowsOverlay]="true"
      [animateRows]="true"
      [sideBar]="{
        toolPanels: ['columns', 'filters'],
        hiddenByDefault: true
      }"
      (gridReady)="onGridReady($event)"
    />
  </section>
</main>

<p-drawer
  position="left"
  [visible]="drawerVisible()"
  (visibleChange)="drawerVisible.set($event)"
  [modal]="false"
  [dismissible]="false"
  [showCloseIcon]="false"
>
  <ng-template #headless>
    <aside class="drawer-content" aria-label="Portfolio drawer">
      <div class="drawer-close-action">
        <p-button
          icon="pi pi-times"
          [text]="true"
          ariaLabel="Close portfolio drawer"
          (onClick)="drawerVisible.set(false)"
        />
      </div>
    </aside>
  </ng-template>
</p-drawer>
