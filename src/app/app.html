<main class="workspace" [class.drawer-open]="drawerVisible()">
  <header class="topbar">
    <div class="header-actions">
      <p-button
        class="sync-control"
        icon="pi pi-refresh"
        [text]="true"
        ariaLabel="Price sync"
      />
      <p-button
        class="ai-control"
        label="AI"
        icon="pi pi-sparkles"
        iconPos="right"
        [outlined]="true"
        ariaLabel="AI assistant"
      />
      <p-iconfield>
        <p-inputicon class="pi pi-search" />
        <input
          pInputText
          type="search"
          placeholder="Instrument search"
          aria-label="Instrument search"
          (input)="setQuickFilter($event)"
        />
      </p-iconfield>
      <p-button
        class="avatar-control"
        icon="pi pi-user"
        [rounded]="true"
        [outlined]="true"
        ariaLabel="User profile"
      />
    </div>
  </header>

  <section class="toolbar" aria-label="Portfolio controls">
    <div class="toolbar-group portfolio-controls">
      <p-button
        class="menu-control"
        icon="pi pi-bars"
        [text]="true"
        ariaLabel="Open portfolio tree"
        (onClick)="drawerVisible.set(!drawerVisible())"
      />

      <p-select
        [options]="portfolioOptions"
        [(ngModel)]="selectedPortfolio"
        placeholder="Portfolio --"
        ariaLabel="Portfolio"
      />

      <p-menu
        #portfolioActionsMenu
        [model]="portfolioMenuItems"
        [popup]="true"
        appendTo="body"
      />
      <p-button
        class="portfolio-menu-control"
        icon="pi pi-ellipsis-v"
        [text]="true"
        ariaLabel="Portfolio actions"
        (onClick)="portfolioActionsMenu.toggle($event)"
      />
    </div>

    <div class="toolbar-group grid-controls">
      <p-iconfield>
        <p-inputicon class="pi pi-search" />
        <p-autocomplete
          [(ngModel)]="instrumentQuery"
          [suggestions]="instrumentSuggestions"
          [dropdown]="true"
          [showEmptyMessage]="false"
          dropdownMode="current"
          placeholder="Add instrument"
          ariaLabel="Add instrument"
          dropdownAriaLabel="Show instruments"
          (completeMethod)="searchInstruments($event)"
        />
      </p-iconfield>

      <p-iconfield>
        <p-inputicon class="pi pi-search" />
        <input
          pInputText
          type="search"
          placeholder="Filter"
          aria-label="Filter"
          (input)="setQuickFilter($event)"
        />
      </p-iconfield>
    </div>

    <div class="toolbar-group utility-controls">
      @if (activeTreeFilter()) {
        <p-button
          class="active-filter-control"
          [label]="activeTreeFilter()"
          icon="pi pi-times"
          iconPos="right"
          [outlined]="true"
          (onClick)="clearFilter()"
        />
      }
      <p-button
        class="more-control"
        icon="pi pi-ellipsis-v"
        [text]="true"
        ariaLabel="More actions"
      />
      <p-button
        class="fullscreen-control"
        icon="pi pi-window-maximize"
        ariaLabel="Fullscreen"
      />
    </div>
  </section>

  <section class="grid-shell">
    <ag-grid-angular
      class="portfolio-grid"
      [theme]="gridTheme"
      [rowData]="rowData"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [autoGroupColumnDef]="autoGroupColumnDef"
      [treeData]="true"
      treeDataChildrenField="children"
      [groupDefaultExpanded]="2"
      [suppressGroupRowsSticky]="true"
      [suppressNoRowsOverlay]="true"
      [animateRows]="true"
      [sideBar]="{
        toolPanels: ['columns', 'filters'],
        hiddenByDefault: true
      }"
      (gridReady)="onGridReady($event)"
    />
  </section>
</main>

<p-drawer
  position="left"
  [visible]="drawerVisible()"
  (visibleChange)="drawerVisible.set($event)"
  [modal]="false"
  [dismissible]="false"
  [showCloseIcon]="false"
  [style]="{ width: 'var(--drawer-width)' }"
>
  <ng-template #headless>
    <aside class="drawer-content" aria-label="Portfolio drawer">
      <p-button
        class="drawer-close-control"
        icon="pi pi-times"
        [text]="true"
        ariaLabel="Close portfolio drawer"
        (onClick)="drawerVisible.set(false)"
      />
    </aside>
  </ng-template>
</p-drawer>
